# Hermes Agent CLI Configuration - Gemma-4-31B with TurboQuant
# WSL2 with mirrored networking -> localhost == Windows localhost
#
# KEY CHANGE: cache_type_v changed from q4_0 to turbo4
# This requires TheTom/llama-cpp-turboquant fork with TurboQuant support
#
# Asymmetric K/V: q8_0-K + turbo4-V
# - K at q8_0 preserves attention routing quality (softmax is sensitive to K errors)
# - V at turbo4 is the highest-fidelity TurboQuant level (needle 9/9)
# - turbo3/turbo3 also works on gfx1201 (no NaN here) and is lossless for long-context
#   retrieval; use it when 256K context + max decode speed matter most.
# - CRITICAL: keep batch small (2048). A 16384 batch spills VRAM at long context.

providers:
  local-llama-cpp:
    name: "llama.cpp"
    base_url: "http://127.0.0.1:8080/v1"
    api_key: "llama.cpp"
    api_mode: "chat_completions"
    default_model: "Gemma-4-31B-it GGUF"
    model: "Gemma-4-31B-it GGUF"
    models:
      - "Gemma-4-31B-it GGUF"

model:
  path: 'E:\Coding\custom-rag\data\models\gemma-4-31b-it\gemma-4-31B-it-Q4_K_M.gguf'
  default: "Gemma-4-31B-it GGUF"
  # Gemma-4 has the chat template embedded in the GGUF; leave empty.
  chat_template: ''
  backend: "hip"
  # TheTom/llama-cpp-turboquant fork with TurboQuant + SWA fix
  # Build from: https://github.com/TheTom/llama-cpp-turboquant (feature/turboquant-kv-cache)
  # See docs/BUILD.md for Windows HIP build instructions
  binary_dir: "bTurboQuant-gfx1201-turbo4-graphs"
  provider: "custom:local-llama-cpp"
  base_url: "http://127.0.0.1:8080/v1"
  api_key: "llama.cpp"
  # 128K for agentic coding; set to 262144 for Gemma-4's full 256K native context.
  # With q8_0-K + turbo4-V, the full 256K loads in ~22.9 GB (of 32 GB).
  context_length: 131072
  # CRITICAL: keep batch small. A large batch (16384) allocates a ~1.8 GB Flash-Attention
  # scratch buffer that spills VRAM at long context and collapses decode to ~1.3 tok/s @128K.
  # 2048/512 recovers 6.63 tok/s and loads to full 256K.
  batch_size: 2048
  ubatch_size: 512
  # TURBOQUANT KV CACHE — asymmetric config for Q4_K_M models
  # q8_0-K: 8-bit keys preserve attention routing (softmax quality)
  # turbo4-V: highest-fidelity TurboQuant level (needle 9/9, KLD same-top 76.5%)
  cache_type_k: "q8_0"
  cache_type_v: "turbo4"
  # Single slot for maximum context — Flash Attention on
  parallel_slots: 1
  flash_attn: true
  # Sampling tuned per Google Gemma-4 best practices
  temperature: 1.0
  top_p: 0.95
  top_k: 64
  min_p: 0.0
  presence_penalty: 0.0
  repeat_penalty: 1.0
  # Gemma-4 has native thinking channel (<|channel|>thought) for CoT reasoning
  reasoning: on
  reasoning_budget: 2048
  # Gemma-4 does NOT support MTP (Multi-Token Prediction)
  speculative_type: "none"
  speculative_draft_tokens: ""

tools:
  enabled:
    - bash
    - read_file
    - write_file
    - edit_file
    - web_search
    - browser